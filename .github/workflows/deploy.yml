name: Deploy to EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup docker build
      uses: docker/setup-buildx-action@v3

    - name: Login to dockerhub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push docker image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/nextchat:latest .
        docker push ${{ secrets.DOCKER_USERNAME }}/nextchat:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SECRET }}
        script: |
          echo '${{ secrets.ENV_FILE }}' > .env

          echo "===== ENV FILE ====="
          cat .env
          echo "===================="

          echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

          docker pull ${{ secrets.DOCKER_USERNAME }}/nextchat:latest

          docker stop app || true
          docker rm app || true

          docker run -d -p 8080:8080 \
            --name app \
            --env-file .env \
            ${{ secrets.DOCKER_USERNAME }}/nextchat:latest
