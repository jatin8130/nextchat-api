name: Deploy to EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup docker build
      uses: docker/setup-buildx-action@v3

    - name: Login to dockerhub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push docker image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/nextchat:latest .
        docker push ${{ secrets.DOCKER_USERNAME }}/nextchat:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      env:
        DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        ENV_FILE: ${{ secrets.ENV_FILE }}
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SECRET }}
        envs: |
          DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD=${{ secrets.DOCKER_PASSWORD }}
          ENV_FILE=${{ secrets.ENV_FILE }}
        script: |
          echo "$ENV_FILE" > .env
          echo $DOCKER_PASSWORD | docker login -u $DOCKER_USERNAME --password-stdin
          docker pull jatin8130/nextchat:latest
          docker stop app || true
          docker rm app || true
          docker run -d -p 8080:8080 --name app jatin8130/nextchat:latest
